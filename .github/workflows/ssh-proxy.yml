name: SSH Proxy with Tailscale

on:
  workflow_dispatch:        # manual trigger only
  # you could add schedule, but tunnel URL changes

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours max
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm init -y
          npm install express ws ssh2 uuid

      - name: Create server.js
        run: |
          cat > server.js << 'EOF'
    const express = require('express');
    const WebSocket = require('ws');
    const { Client } = require('ssh2');
    const { v4: uuidv4 } = require('uuid');
    
    const app = express();
    const server = require('http').createServer(app);
    const wss = new WebSocket.Server({ server });
    const connections = new Map();
    
    app.use(express.json());
    
    wss.on('connection', (ws) => {
      const sessionId = uuidv4();
      let sshClient = null;
      let stream = null;
    
      ws.on('message', (data) => {
        const msg = JSON.parse(data);
        switch (msg.type) {
          case 'connect':
            sshClient = new Client();
            sshClient.on('ready', () => {
              sshClient.shell({ term: 'xterm-256color' }, (err, shellStream) => {
                if (err) return ws.send(JSON.stringify({ type: 'error', message: err.message }));
                stream = shellStream;
                connections.set(sessionId, { sshClient, stream });
                stream.on('data', (d) => ws.send(JSON.stringify({ type: 'data', data: d.toString() })));
                stream.on('close', () => ws.send(JSON.stringify({ type: 'closed' })));
                ws.send(JSON.stringify({ type: 'connected' }));
              });
            });
            sshClient.on('error', (err) => ws.send(JSON.stringify({ type: 'error', message: err.message })));
            sshClient.connect({ host: msg.host, port: msg.port, username: msg.username, password: msg.password, privateKey: msg.privateKey });
            break;
          case 'data':
            if (stream && stream.writable) stream.write(msg.data);
            break;
          case 'resize':
            if (stream && stream.setWindow) stream.setWindow(msg.rows, msg.cols);
            break;
        }
      });
      ws.on('close', () => {
        if (stream) stream.end();
        if (sshClient) sshClient.end();
        connections.delete(sessionId);
      });
    });
    
    server.listen(3000, '0.0.0.0', () => console.log('Proxy listening on 3000'));
    EOF
        # ⚠️ In real use, you'd commit server.js to the repo. For brevity, I'm showing the command.

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key=${{ secrets.TS_AUTHKEY }} --accept-dns=false --accept-routes

      - name: Start SSH proxy in background
        run: |
          node server.js &
          sleep 3

      - name: Expose via localtunnel
        run: |
          npx localtunnel --port 3000 --print-requests &
          sleep 5
          echo "==========================================="
          echo "🔗 Copy the tunnel URL from the logs above"
          echo "Then open: https://<your-github-pages-url>/?ws=<tunnel-url-wss>"
          echo "==========================================="
          # Keep the runner alive
          sleep infinity
